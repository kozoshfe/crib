<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QA Interview</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="interview.css?v=9" />
</head>
<body>
  <main class="interview-page">
    <div class="book-toolbar">
      <a class="toolbar-brand" href="index.html" aria-label="Перейти на сторінку Відповіді">QA Interview Platform</a>
      <nav class="app-nav" aria-label="Основне меню">
        <a class="toolbar-link" href="index.html">Відповіді</a>
        <a class="toolbar-link" href="questions.html">Запитання</a>
        <a class="toolbar-link" href="tests.html">Тести</a>
        <a class="toolbar-link active" href="interview.html" aria-current="page">Інтерв'ю</a>
      </nav>
      <button id="logoutBtn" class="logout" type="button">Вийти</button>
    </div>

    <section class="interview-shell" aria-live="polite">
      <article class="question-panel">
        <div class="interview-topline">
          <div id="questionCategory">Інтерв'ю</div>
          <div id="questionCounter">0 / 0</div>
        </div>
        <div class="question-heading">
          <h1 id="questionText">Питань ще немає.</h1>
          <button id="showAnswerBtn" class="show-answer-action" type="button" aria-expanded="false" aria-controls="answerPanel" title="Показати відповідь">
            <span aria-hidden="true">?</span>
            <span class="sr-only">Показати відповідь</span>
          </button>
        </div>
        <div id="questionStatus" class="feedback hidden"></div>
        <section id="answerPanel" class="answer-panel hidden" aria-live="polite">
          <div class="answer-panel-heading">
            <span class="answer-panel-icon" aria-hidden="true">✦</span>
            <span>Відповідь</span>
          </div>
          <div id="answerText" class="answer-text"></div>
        </section>
        <div class="interview-actions">
          <button id="knowBtn" class="primary-action know-action" type="button">Знаю</button>
          <button id="dontKnowBtn" class="secondary-action dont-know-action" type="button">Не знаю</button>
        </div>
        <div id="reviewPanel" class="review-panel hidden">
          <h2 id="reviewTitle">Що повторити</h2>
          <div id="reviewList" class="review-list"></div>
          <button id="exportUnknownBtn" class="primary-action export-action" type="button">Конвертувати запитання</button>
          <button id="restartInterviewBtn" class="secondary-action restart-action" type="button">Почати заново</button>
        </div>
      </article>
    </section>
  </main>
  <script src="data.js?v=supabase-1"></script>
  <script src="interview.js?v=9"></script>
</body>
</html>
