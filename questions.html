<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Окремі запитання</title>
  <link rel="stylesheet" href="questions.css?v=12" />
</head>
<body>
  <div id="authScreen" class="auth-screen hidden">
    <div class="auth-card">
      <h2>Вхід</h2>
      <p class="muted">Ця сторінка має окрему базу запитань і не змінює QA Handbook.</p>
      <label>Email</label>
      <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="email" />
      <label>Пароль</label>
      <input id="loginPassword" type="password" placeholder="Введи пароль" autocomplete="current-password" />
      <button id="loginBtn" class="primary" type="button">Увійти</button>
      <div id="loginMsg" class="muted"></div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="brand">Запитання</div>
    <div class="search-wrap">
      <input id="searchInput" class="search" placeholder="Пошук..." />
      <button id="clearSearchBtn" class="clear-search hidden" type="button" aria-label="Очистити пошук" title="Очистити пошук">×</button>
    </div>
    <div class="question-stats" aria-label="Статистика питань">
      <div><span id="totalQuestionsCount">0</span><small>Всього запитань</small></div>
      <div><span id="coveredQuestionsCount">0</span><small>Покрито</small></div>
    </div>
    <label class="filter-toggle" for="uncoveredOnlyToggle">
      <span>Лише не покрито</span>
      <input id="uncoveredOnlyToggle" type="checkbox" />
      <span class="toggle-slider" aria-hidden="true"></span>
    </label>
    <nav id="categoryList" class="category-list"></nav>
    <div class="actions">
      <button id="addCategoryBtn" type="button">+ Категорія</button>
      <button id="addQuestionBtn" type="button">+ Питання</button>
    </div>
  </aside>

  <main class="book">
    <div class="book-toolbar">
      <div id="syncStatus" class="sync-status hidden" aria-live="polite">Supabase: очікує вхід</div>
      <a class="toolbar-link" href="tests.html">Тести</a>
      <a class="toolbar-link" href="index.html">Відповіді</a>
      <button id="syncBtn" class="sync-supabase" type="button">Зберегти</button>
      <button id="logoutBtn" class="logout" type="button">Вийти</button>
    </div>
    <h1 id="categoryTitle"></h1>
    <section id="questionsList" class="questions-list"></section>
  </main>

  <div id="questionModal" class="modal hidden">
    <div class="modal-box">
      <button class="close" id="closeQuestionModal" type="button">×</button>
      <h2 id="modalTitle">Нове питання</h2>
      <label>Категорія</label>
      <select id="questionCategory"></select>
      <label>Питання</label>
      <input id="questionInput" placeholder="Наприклад: Як протестувати форму логіну?" />
      <label>Нотатка / коротка відповідь</label>
      <textarea id="noteInput" rows="5" placeholder="Можна залишити порожнім або записати підказку..."></textarea>
      <div class="modal-actions">
        <button id="saveQuestionBtn" class="primary" type="button">Зберегти</button>
        <button id="deleteQuestionBtn" class="danger hidden" type="button">Видалити</button>
      </div>
    </div>
  </div>

  <script src="data.js?v=supabase-1"></script>
  <script src="questions-data.js?v=2"></script>
  <script src="questions.js?v=15"></script>
</body>
</html>
